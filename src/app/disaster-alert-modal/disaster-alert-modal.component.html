<div class="disaster-alert-modal">
  <div class="alert-header">
    <h2>Peringatan Darurat</h2>
    <span class="badge">DISASTER ACTIVE</span>
  </div>

  <div class="alert-content">
    <p>{{ data.note }}</p>
  </div>

  <div class="alert-actions">
    <button type="button" (click)="close()">Tutup</button>
  </div>
</div>
