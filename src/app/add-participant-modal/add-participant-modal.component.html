<div class="p-6">
  <h2 class="modal-title text-center text-lg font-bold mb-3">{{ data.title }}</h2>

  <div *ngIf="showParticipantForm; else emailConfirmation">
    <p class="modal-message text-base font-medium mb-2">{{ data.message }}</p>
    <p class="modal-submessage text-sm text-gray-500 mb-4">{{ data.subMessage }}</p>

    <div class="border-t border-gray-200 pt-4">
      <div class="flex justify-between items-center mb-3">
        <h4 class="text-base font-medium text-gray-900">Participants ({{ participants.length }})</h4>
        <button type="button" (click)="addParticipantToForm()"
          class="inline-flex items-center px-2 py-1 text-xs leading-4 font-medium rounded text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
          + Add
        </button>
      </div>

      <div [formGroup]="bookingForm" class="space-y-3">
        <div formArrayName="participants" class="space-y-3">
          <!-- Loading indicator -->
          <div *ngIf="isLoading" class="text-center py-4">
            <div class="inline-block animate-spin rounded-full h-6 w-6 border-b-2 border-blue-600"></div>
            <p class="text-sm text-gray-500 mt-2">Loading participants...</p>
          </div>

          <!-- Participants list -->
          <div *ngIf="!isLoading" class="space-y-3">
            <div *ngFor="let participant of participants.controls; let i = index" [formGroupName]="i"
              class="bg-gray-50 p-3 rounded border border-gray-200">
              <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                <div>
                  <label class="block text-xs font-medium text-gray-700 mb-1">Name *</label>
                  <input type="text" formControlName="name"
                    class="w-full px-2 py-1.5 text-xs border border-gray-300 rounded shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500"
                    placeholder="Name">
                  <div *ngIf="getParticipantControl(i).get('name')?.invalid && getParticipantControl(i).get('name')?.touched" 
                       class="text-red-500 text-xs mt-1">
                    Name is required
                  </div>
                </div>

                <div>
                  <label class="block text-xs font-medium text-gray-700 mb-1">Email *</label>
                  <input type="email" formControlName="email"
                    class="w-full px-2 py-1.5 text-xs border border-gray-300 rounded shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500"
                    placeholder="email@example.com">
                  <div *ngIf="getParticipantControl(i).get('email')?.invalid && getParticipantControl(i).get('email')?.touched" 
                       class="text-red-500 text-xs mt-1">
                    Valid email is required
                  </div>
                </div>

                <div class="flex items-end">
                  <button type="button" (click)="removeParticipant(i)"
                    class="w-full px-2 py-1.5 text-xs bg-red-600 text-white rounded hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500">
                    Remove
                  </button>
                </div>
              </div>
            </div>

            <div *ngIf="participants.length === 0 && !isLoading" class="text-center py-3 text-gray-500 text-xs">
              No participants added
            </div>
          </div>
        </div>
      </div>
    </div>

    <p *ngIf="errorMessage" class="error-message text-error text-xs mt-1 mb-4">{{ errorMessage }}</p>

    <mat-dialog-actions class="flex flex-col sm:flex-row gap-3 justify-center mt-6">
      <button mat-button (click)="submitParticipants()" class="btn-primary flex-1">{{ data.button1 }}</button>
      <button mat-button (click)="cancel()" class="btn-cancel flex-1">{{ data.button2 }}</button>
    </mat-dialog-actions>
  </div>

  <ng-template #emailConfirmation>
    <p class="modal-message text-base font-medium mb-2">{{ data.message }}</p>
    <p class="modal-submessage text-sm text-gray-500 mb-4">{{ data.subMessage }}</p>

    <mat-form-field appearance="fill" class="w-full mb-4">
      <mat-label>Enter PIC Email</mat-label>
      <input matInput [(ngModel)]="enteredEmail" class="form-input">
    </mat-form-field>

    <p *ngIf="errorMessage" class="error-message text-error text-xs mt-1 mb-4">{{ errorMessage }}</p>

    <mat-dialog-actions class="flex flex-col sm:flex-row gap-3 justify-center">
      <button mat-button (click)="verifyPicEmail()" class="btn-primary flex-1">{{ data.button1 }}</button>
      <button mat-button (click)="cancel()" class="btn-cancel flex-1">{{ data.button2 }}</button>
    </mat-dialog-actions>
  </ng-template>
</div>
